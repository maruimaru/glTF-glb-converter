<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>glTF → GLB コンバーター</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #0f0f13;
      color: #e8e8ec;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 40px;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2e2e3e;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
    }

    .drop-zone {
      border: 2px dashed #3a3a50;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: #7c6df0;
      background: rgba(124, 109, 240, 0.06);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
    }

    .drop-label {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .drop-hint {
      font-size: 0.8rem;
      color: #666;
    }

    .file-list {
      margin-top: 20px;
      display: none;
    }

    .file-list.visible { display: block; }

    .file-list-title {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: #12121a;
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 0.82rem;
      font-family: monospace;
    }

    .file-item .badge {
      font-size: 0.68rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: sans-serif;
      font-weight: 600;
      flex-shrink: 0;
    }

    .badge-gltf  { background: #7c6df030; color: #a78bfa; }
    .badge-bin   { background: #059c6a20; color: #34d399; }
    .badge-img   { background: #d9770620; color: #fb923c; }
    .badge-other { background: #33333340; color: #888; }

    .convert-btn {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #7c6df0, #4f8ef5);
      color: #fff;
      transition: opacity 0.2s, transform 0.1s;
    }

    .convert-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .convert-btn:not(:disabled):hover { opacity: 0.9; }
    .convert-btn:not(:disabled):active { transform: scale(0.98); }

    .log-box {
      margin-top: 20px;
      background: #0a0a10;
      border-radius: 10px;
      padding: 14px 16px;
      font-family: monospace;
      font-size: 0.8rem;
      line-height: 1.7;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }

    .log-box.visible { display: block; }

    .log-ok   { color: #34d399; }
    .log-warn { color: #fbbf24; }
    .log-err  { color: #f87171; }
    .log-info { color: #93c5fd; }

    .download-btn {
      margin-top: 12px;
      width: 100%;
      padding: 14px;
      border: 1px solid #34d39950;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: #059c6a15;
      color: #34d399;
      display: none;
      transition: background 0.2s;
    }

    .download-btn.visible { display: block; }
    .download-btn:hover { background: #059c6a30; }

    footer {
      margin-top: 40px;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>

  <h1>glTF → GLB コンバーター</h1>
  <p class="subtitle">フォルダを選択するだけで Nomad Sculpt 対応の .glb を生成します</p>

  <div class="card">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="folderInput" webkitdirectory multiple accept="" />
      <div class="drop-icon">📂</div>
      <div class="drop-label">フォルダをクリックして選択</div>
      <div class="drop-hint">または .gltf / .bin / テクスチャファイルをまとめてドロップ</div>
    </div>

    <div class="file-list" id="fileList">
      <div class="file-list-title">検出ファイル</div>
      <div id="fileItems"></div>
    </div>

    <button class="convert-btn" id="convertBtn" disabled>変換して .glb をダウンロード</button>
    <div class="log-box" id="logBox"></div>
    <button class="download-btn" id="downloadBtn">⬇ sensei.glb をダウンロード</button>
  </div>

  <footer>クライアントサイド処理のみ・ファイルはサーバーに送信されません</footer>

<script>
(function () {
  const folderInput = document.getElementById('folderInput');
  const dropZone    = document.getElementById('dropZone');
  const fileList    = document.getElementById('fileList');
  const fileItems   = document.getElementById('fileItems');
  const convertBtn  = document.getElementById('convertBtn');
  const logBox      = document.getElementById('logBox');
  const downloadBtn = document.getElementById('downloadBtn');

  let selectedFiles = [];
  let resultBlob    = null;
  let resultName    = 'model.glb';

  // ── ドラッグ&ドロップ対応 ──────────────────────────────────
  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const items = e.dataTransfer.items;
    if (items) {
      // DataTransferItem API（フォルダドロップ対応）
      const filePromises = [];
      for (const item of items) {
        const entry = item.webkitGetAsEntry?.();
        if (entry) filePromises.push(traverseEntry(entry));
      }
      Promise.all(filePromises).then(arrays => {
        handleFiles(arrays.flat());
      });
    } else {
      handleFiles(Array.from(e.dataTransfer.files));
    }
  });

  function traverseEntry(entry) {
    return new Promise(resolve => {
      if (entry.isFile) {
        entry.file(f => resolve([f]));
      } else if (entry.isDirectory) {
        const reader = entry.createReader();
        const allEntries = [];
        function readAll() {
          reader.readEntries(results => {
            if (!results.length) {
              Promise.all(allEntries.map(traverseEntry)).then(a => resolve(a.flat()));
            } else {
              allEntries.push(...results);
              readAll();
            }
          });
        }
        readAll();
      } else {
        resolve([]);
      }
    });
  }

  folderInput.addEventListener('change', () => handleFiles(Array.from(folderInput.files)));

  // ── ファイル一覧表示 ──────────────────────────────────────
  function handleFiles(files) {
    selectedFiles = files;
    resultBlob = null;
    downloadBtn.classList.remove('visible');
    logBox.classList.remove('visible');
    logBox.innerHTML = '';

    fileItems.innerHTML = '';
    files.forEach(f => {
      const ext = f.name.split('.').pop().toLowerCase();
      const badge = ext === 'gltf' ? 'gltf'
                  : ext === 'bin'  ? 'bin'
                  : ['jpg','jpeg','png','webp','ktx','ktx2','basis'].includes(ext) ? 'img'
                  : 'other';
      const div = document.createElement('div');
      div.className = 'file-item';
      div.innerHTML = `<span class="badge badge-${badge}">${ext.toUpperCase()}</span>
                       <span>${f.webkitRelativePath || f.name}</span>`;
      fileItems.appendChild(div);
    });

    fileList.classList.add('visible');
    convertBtn.disabled = files.length === 0;
  }

  // ── 変換処理 ──────────────────────────────────────────────
  convertBtn.addEventListener('click', convert);

  function log(msg, cls = 'log-info') {
    const line = document.createElement('div');
    line.className = cls;
    line.textContent = msg;
    logBox.appendChild(line);
    logBox.scrollTop = logBox.scrollHeight;
  }

  async function readAsText(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = rej;
      r.readAsText(file);
    });
  }

  async function readAsArrayBuffer(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = rej;
      r.readAsArrayBuffer(file);
    });
  }

  function pad4Bytes(buffer, padByte = 0x00) {
    const r = buffer.byteLength % 4;
    if (r === 0) return buffer;
    const padded = new Uint8Array(buffer.byteLength + (4 - r));
    padded.fill(padByte);
    padded.set(new Uint8Array(buffer), 0);
    return padded.buffer;
  }

  function pad4String(str, padChar = ' ') {
    const r = str.length % 4;
    if (r === 0) return str;
    return str + padChar.repeat(4 - r);
  }

  async function convert() {
    logBox.innerHTML = '';
    logBox.classList.add('visible');
    downloadBtn.classList.remove('visible');
    convertBtn.disabled = true;

    try {
      // 1. .gltf ファイルを探す
      const gltfFile = selectedFiles.find(f => f.name.endsWith('.gltf'));
      if (!gltfFile) throw new Error('.gltf ファイルが見つかりません');
      log(`gltf: ${gltfFile.name}`, 'log-ok');

      const gltf = JSON.parse(await readAsText(gltfFile));
      const baseName = gltfFile.name.replace(/\.gltf$/, '');
      resultName = baseName + '.glb';

      // ファイル名 → File オブジェクトのマップ（パス末尾でマッチ）
      const fileMap = new Map();
      selectedFiles.forEach(f => {
        fileMap.set(f.name, f);
        if (f.webkitRelativePath) {
          // "folder/textures/tex.jpg" → "textures/tex.jpg" もマップ
          const parts = f.webkitRelativePath.split('/');
          for (let i = 1; i < parts.length; i++) {
            fileMap.set(parts.slice(i).join('/'), f);
          }
        }
      });

      function findFile(uri) {
        if (!uri) return null;
        // URIのファイル名部分で検索
        const decoded = decodeURIComponent(uri).replace(/\\/g, '/');
        const fname = decoded.split('/').pop();
        return fileMap.get(decoded) || fileMap.get(fname) || null;
      }

      // 2. バイナリチャンク用データを収集（bin + 各テクスチャを結合）
      const binChunkParts = [];   // ArrayBuffer[]
      let binByteLength = 0;

      // 2a. 既存の buffer[0] (scene.bin) を読む
      const buf0 = gltf.buffers?.[0];
      if (buf0?.uri) {
        const binFile = findFile(buf0.uri);
        if (!binFile) throw new Error(`bin ファイルが見つかりません: ${buf0.uri}`);
        log(`bin: ${binFile.name}`, 'log-ok');
        const binBuf = pad4Bytes(await readAsArrayBuffer(binFile));
        binChunkParts.push(binBuf);
        binByteLength += binBuf.byteLength;
        // buffer[0].uri を削除し byteLength は後で更新
        delete buf0.uri;
      }

      // 2b. 各 image の uri → bufferView に変換
      if (gltf.images) {
        for (let i = 0; i < gltf.images.length; i++) {
          const img = gltf.images[i];
          if (!img.uri) continue;

          const imgFile = findFile(img.uri);
          if (!imgFile) {
            log(`警告: 画像ファイルが見つかりません: ${img.uri}`, 'log-warn');
            continue;
          }
          log(`texture: ${imgFile.name}`, 'log-ok');

          const imgBuf = await readAsArrayBuffer(imgFile);
          const mimeType = imgFile.type || guessMime(imgFile.name);

          // bufferView を追加
          if (!gltf.bufferViews) gltf.bufferViews = [];
          const bvIdx = gltf.bufferViews.length;
          gltf.bufferViews.push({
            buffer: 0,
            byteOffset: binByteLength,
            byteLength: imgBuf.byteLength,
          });

          // image を更新
          delete img.uri;
          img.bufferView = bvIdx;
          img.mimeType = mimeType;

          // パディングして結合
          const padded = pad4Bytes(imgBuf);
          binChunkParts.push(padded);
          binByteLength += padded.byteLength;
        }
      }

      // 2c. buffer[0] の byteLength を更新
      if (gltf.buffers?.[0]) {
        gltf.buffers[0].byteLength = binByteLength;
      }

      // 3. JSON チャンク（スペースでパディング）
      const jsonStr = pad4String(JSON.stringify(gltf));
      const jsonBytes = new TextEncoder().encode(jsonStr);

      // 4. BIN チャンク（結合）
      const binChunk = new Uint8Array(binByteLength);
      let offset = 0;
      for (const part of binChunkParts) {
        binChunk.set(new Uint8Array(part), offset);
        offset += part.byteLength;
      }

      // 5. GLB 組み立て
      const totalLen = 12                      // header
                     + 8 + jsonBytes.byteLength // JSON chunk
                     + (binByteLength > 0 ? 8 + binByteLength : 0); // BIN chunk

      const glb = new ArrayBuffer(totalLen);
      const view = new DataView(glb);
      let pos = 0;

      // Header
      view.setUint32(pos, 0x46546C67, true); pos += 4; // "glTF"
      view.setUint32(pos, 2, true);           pos += 4; // version
      view.setUint32(pos, totalLen, true);    pos += 4;

      // JSON chunk
      view.setUint32(pos, jsonBytes.byteLength, true); pos += 4;
      view.setUint32(pos, 0x4E4F534A, true);           pos += 4; // JSON
      new Uint8Array(glb, pos).set(jsonBytes); pos += jsonBytes.byteLength;

      // BIN chunk
      if (binByteLength > 0) {
        view.setUint32(pos, binByteLength, true); pos += 4;
        view.setUint32(pos, 0x004E4942, true);    pos += 4; // BIN\0
        new Uint8Array(glb, pos).set(binChunk);   pos += binByteLength;
      }

      resultBlob = new Blob([glb], { type: 'model/gltf-binary' });
      log(`完了: ${resultName} (${(resultBlob.size / 1024 / 1024).toFixed(2)} MB)`, 'log-ok');

      downloadBtn.textContent = `⬇ ${resultName} をダウンロード`;
      downloadBtn.classList.add('visible');
    } catch (err) {
      log(`エラー: ${err.message}`, 'log-err');
    } finally {
      convertBtn.disabled = false;
    }
  }

  downloadBtn.addEventListener('click', () => {
    if (!resultBlob) return;
    const url = URL.createObjectURL(resultBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = resultName;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  });

  function guessMime(filename) {
    const ext = filename.split('.').pop().toLowerCase();
    const map = { jpg: 'image/jpeg', jpeg: 'image/jpeg', png: 'image/png',
                  webp: 'image/webp', ktx: 'image/ktx', ktx2: 'image/ktx2',
                  basis: 'image/basis' };
    return map[ext] || 'application/octet-stream';
  }
})();
</script>
</body>
</html>
